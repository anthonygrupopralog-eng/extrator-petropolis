<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Extrator Petropolis</title>

<style>
body {
    font-family: Arial;
    padding: 20px;
    background: #f4f6f9;
}

.area {
    border: 2px dashed #777;
    padding: 40px;
    text-align: center;
    cursor: pointer;
    background: #fff;
    margin-bottom: 20px;
}

.area:hover { background: #eee; }

.item {
    background: white;
    padding: 12px;
    margin-bottom: 10px;
    border-left: 5px solid #007bff;
}

button {
    margin-left: 5px;
    cursor: pointer;
}

.resumo {
    background: #d1ecf1;
    padding: 15px;
    margin-top: 20px;
    font-weight: bold;
}
</style>
</head>

<body>

<h2>📊 Extrator NF-e Grupo Petrópolis</h2>

<div class="area" id="drop">
Arraste ou clique para importar
</div>

<input type="file" id="input" multiple accept="application/pdf" hidden>

<div id="saida"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js";

const drop = document.getElementById("drop");
const input = document.getElementById("input");
const saida = document.getElementById("saida");

let listaNotas = [];

// ===== COPIAR TEXTO =====
function copiarTexto(valor) {
    navigator.clipboard.writeText(valor);
}

// ===== INTERAÇÃO =====
drop.onclick = () => input.click();

drop.ondragover = e => e.preventDefault();

drop.ondrop = e => {
    e.preventDefault();
    listaNotas = [];
    saida.innerHTML = "";
    processar(e.dataTransfer.files);
};

input.onchange = () => {
    listaNotas = [];
    saida.innerHTML = "";
    processar(input.files);
};

// ===== PROCESSAR =====
async function processar(files) {

    for (let file of files) {

        if (file.type !== "application/pdf") continue;

        try {

            const buffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({data: buffer}).promise;

            let texto = "";

            for (let i = 1; i <= Math.min(pdf.numPages, 2); i++) {
                let page = await pdf.getPage(i);
                let content = await page.getTextContent();
                texto += content.items.map(i => i.str).join(" ");
            }

            texto = texto.replace(/\s+/g, " ").toUpperCase();

            // 🚫 IGNORA BOLETO
            if (texto.includes("BANCO DO BRASIL")) continue;

            // 🚚 PEDÁGIO
            if (texto.includes("PEDÁGIO")) {
                extrairPedagio(texto, file.name);
                continue;
            }

            // 📄 NF-e
            extrairPetropolis(texto, file.name);

        } catch {
            console.log("Erro:", file.name);
        }
    }

    mostrarResumo();
}

// ===== EXTRAIR NF-e =====
function extrairPetropolis(texto, nome) {

    let numero =
        texto.match(/Nº\s*(\d{6,})/)?.[1] ||
        texto.match(/NF-E\s*(\d+)/)?.[1] ||
        "ERRO";

    // remover zeros à esquerda
    if (numero !== "ERRO") {
        numero = String(parseInt(numero));
        listaNotas.push(numero);
    }

    let remetente =
        texto.split("DESTINATÁRIO")[0]
        .match(/CNPJ\s*([\d\.\/\-]+)/)?.[1];

    remetente = remetente ? remetente.replace(/\D/g, "") : "ERRO";

    let destinatario =
        texto.match(/DESTINAT[ÁA]RIO.*?CNPJ\/CPF\s*([\d\.\/\-]+)/)?.[1];

    destinatario = destinatario ? destinatario.replace(/\D/g, "") : "ERRO";

    let frete = texto.match(/FRETE POR CONTA\s*(\d-[A-Z]+)/)?.[1] || "ERRO";

    let chave = texto.match(/CHAVE DE ACESSO\s*([\d\s]+)/)?.[1];
    chave = chave ? chave.replace(/\D/g, "") : "ERRO";

    let valor = texto.match(/V\.TOTAL NOTA\s*([\d\.,]+)/)?.[1] || "ERRO";

    let peso = texto.match(/PESO BRUTO\s*([\d\.,]+)/)?.[1] || "ERRO";

    let pedido = "";
    if (texto.includes("PALETE")) {
        pedido = texto.match(/PEDIDO:\s*(\d+)/)?.[1] || "NÃO ENCONTRADO";
    }

    mostrar(`
        📄 <b>${nome}</b><br>

        Número: ${numero}
        <button onclick="copiarTexto('${numero}')">📋</button><br>

        Remetente: ${remetente}
        <button onclicktinatario}
        <button onclick="copiarTexto('${destinatario}')">📋</button><br>

        Frete: ${frete}
        <button onclick="copiarTexto('${frete}')">📋</button><br>

        Chave: ${chave}
        <button onclick="copiarTexto('${chave}')">📋</button><br>

        Valor: ${valor}
        <button onclick="copiarTexto('${valor}')">📋</button><br>

        Peso: ${peso}
        <button onclick="copiarTexto('${peso}')">📋</button><br>

        Pedido: ${pedido}
        <button onclick="copiarTexto('${pedido}')">📋</button>
    `);
}

// ===== EXTRAIR PEDÁGIO =====
function extrairPedagio(texto, nome) {

    let cnpj = texto.match(/CLIENTE:\s*([\d\.\/\-]+)/)?.[1];
    cnpj = cnpj ? cnpj.replace(/\D/g, "") : "ERRO";

    let viagem = texto.match(/VIAGEM:\s*(\d+)/)?.[1] || "ERRO";

    let total = texto.match(/TOTAL:\s*([\d,]+)/)?.[1] || "ERRO";

    mostrar(`
        🚚 <b>${nome}</b><br>

        Cliente: ${cnpj}
        <button onclick="copiarTexto('${cnpj}')">📋</button><br>

        Viagem: ${viagem}
        <button onclick="copiarTexto('${viagem}')">📋</button><br>

        Total: ${total}
        <button onclick="copiarTexto('${total}')">📋</button>
    `);
}

// ===== MOSTRAR =====
function mostrar(html) {

    let div = document.createElement("div");
    div.className = "item";
    div.innerHTML = html;

    saida.appendChild(div);
}

// ===== RESUMO FINAL =====
function mostrarResumo() {

    if (listaNotas.length === 0) return;

    let unicas = [...new Set(listaNotas)].sort((a,b)=>a-b);

    let div = document.createElement("div");
    div.className = "resumo";

    div.innerText = "Notas: " + unicas.join(" / ");

    saida.appendChild(div);
}
</script>

</body>
</html>
